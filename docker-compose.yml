version: '3.9'

services:
  # FastAPI backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: archery_scoring_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://archery:archery_pass@db:5432/archery_db
      - REDIS_URL=redis://cache:6379/0
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - API_WORKERS=2
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - STORAGE_PATH=/storage
    volumes:
      - .:/app
      - storage_volume:/storage
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - archery_network
    command: >
      sh -c "
      poetry install &&
      python -m scripts.seed_data &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # PostgreSQL database service
  db:
    image: postgres:15-alpine
    container_name: archery_scoring_db
    environment:
      - POSTGRES_USER=archery
      - POSTGRES_PASSWORD=archery_pass
      - POSTGRES_DB=archery_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archery -d archery_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archery_network

  # Redis cache service
  cache:
    image: redis:7-alpine
    container_name: archery_scoring_cache
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - archery_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  storage_volume:
    driver: local

networks:
  archery_network:
    driver: bridge
